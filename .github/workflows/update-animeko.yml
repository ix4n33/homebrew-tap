name: Update Animeko Casks

on:
    workflow_dispatch:
    schedule:
        - cron: "0 3 * * *"

jobs:
    update:
        runs-on: macos-latest

        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Run updater
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: python3 scripts/update_animeko.py

            - name: Audit casks
              run: |
                  for file in Casks/*.rb; do
                    name=$(basename "$file" .rb)
                    brew audit --cask --online "$name" || true
                  done

            - name: Commit changes
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add Casks
                  if ! git diff --cached --quiet; then
                    git commit -m "Update Animeko casks"
                  fi

            - name: Push changes
              run: git push
