name: Update Animeko Cask
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
jobs:
  update:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Show versions
        run: |
          brew --version
          python3 --version
      - name: Run updater
        run: python3 scripts/update_animeko.py
      - name: Audit casks
        run: |
          if ls Casks/*.rb >/dev/null 2>&1; then
            for file in Casks/*.rb; do
              brew audit --cask --online "$file" || true
            done
          fi
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks
          git diff --cached --quiet || git commit -m "Update Animeko cask(s)"
      - name: Push changes
        run: git push
